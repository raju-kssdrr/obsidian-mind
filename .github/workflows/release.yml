name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v3.8 or 3.8)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            if [[ ! "$VERSION" =~ ^v ]]; then
              VERSION="v$VERSION"
            fi
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected v*.* or v*.*.*)"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create tag (manual trigger only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Run tests
        run: python3 .claude/scripts/test_hooks.py

      - name: Generate changelog
        run: |
          python3 .github/scripts/generate-changelog.py "$VERSION" > /tmp/changelog_section.md

      - name: Build release body
        run: |
          cat > /tmp/release_body.md <<'HEADER'
          ## Quick Start

          **Requirements:** [Obsidian](https://obsidian.md), [Claude Code](https://claude.ai/code), Python 3.8+

          ```bash
          git clone https://github.com/breferrari/obsidian-mind.git
          cd obsidian-mind
          npm install -g @tobilu/qmd   # optional: semantic search
          ```

          Or download the vault zip below and extract it into your Obsidian vaults folder. Open it in Claude Code and run `/om-standup`.

          HEADER
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' /tmp/release_body.md
          cat /tmp/changelog_section.md >> /tmp/release_body.md

      - name: Commit changelog and manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md vault-manifest.json
          git commit -m "release: update CHANGELOG and manifest for $VERSION"
          git push origin main

      - name: Build vault zip
        run: |
          ZIP_NAME="obsidian-mind-${VERSION}.zip"

          zip -r "$ZIP_NAME" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".claude/scripts/test_hooks.py" \
            -x ".DS_Store" \
            -x "thinking/session-logs/*"

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create or update release
        run: |
          if gh release view "$VERSION" &>/dev/null; then
            gh release edit "$VERSION" --notes-file /tmp/release_body.md
            gh release upload "$VERSION" "$ZIP_NAME" --clobber
          else
            gh release create "$VERSION" "$ZIP_NAME" \
              --title "$VERSION" \
              --notes-file /tmp/release_body.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
